---
title: gaming log
tags: subpage
---
{% layout "vgs/index.html" %}

{% block main %}
<section>
  <h2>video game entries</h2>
  <h3>filters</h3>
  <!-- make js filter for tags -->
  <div id="filters">{% for tag in collections.gamelogTags %}<button>{{ tag }}</button> {% endfor %}</div>
  <div class="wrapper-vgs">
    {% for game in collections.gamelog %}
    <a class='{% for tag in game.data.tags %} {% unless tag == " gamelog" %} {{ tag }} {% endunless %} {% endfor %}' href="{{ game.url }}"><img src="/_files/pages/vgs/games/{{ game.fileSlug }}/cover.jpg" alt="{{ game.data.title }} log page"><span>
        <title>{{ game.data.title }}</title>
      </span></a>
    {% endfor %}
    <!-- vgs wrapper end div -->
  </div>
  <!-- content box end div -->
</section>
{% endblock %}
